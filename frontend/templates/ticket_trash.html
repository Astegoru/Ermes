<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticket Trash</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
  <style>
    .hero {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 1.25rem;
      padding: 1rem;
      box-shadow: 0 12px 26px rgba(20, 17, 12, 0.08);
      animation: rise 320ms ease-out;
    }

    .hero-title {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      margin: 0;
      font-size: 1.2rem;
    }

    .hero-subtitle {
      margin: 0.25rem 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .quick-links {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.85rem;
      flex-wrap: wrap;
    }

    .quick-links .btn {
      border-radius: 999px;
      font-weight: 700;
      border-width: 1px;
    }

    .trash-block {
      margin-top: 1rem;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 1rem;
      padding: 0.35rem;
      animation: rise 540ms ease-out;
    }

    .table {
      margin-bottom: 0;
      --bs-table-bg: transparent;
    }

    .table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom-color: var(--line);
    }

    .table td {
      vertical-align: middle;
      border-bottom-color: var(--line);
    }

    .row-actions {
      display: flex;
      gap: 0.45rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .empty-note {
      color: var(--muted);
      text-align: center;
      padding: 1.1rem;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1 class="brand-title">Ticket trash</h1>
        <p class="brand-note">Restore tickets or permanently remove them.</p>
      </div>
      <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
    </header>

    <section class="hero">
      <h2 class="hero-title">Deleted Tickets</h2>
      <p class="hero-subtitle">Owners see their own deleted tickets. Superuser can see all.</p>
      <div class="quick-links">
        <a class="btn btn-outline-secondary" href="/">Back to board</a>
      </div>
    </section>

    <section class="trash-block">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Owner</th>
              <th>Deleted at</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="trash-body"></tbody>
        </table>
      </div>
      <p class="empty-note d-none" id="empty-note">Trash is empty.</p>
    </section>

    <p class="inline-error" id="error"></p>
  </main>

  <script src="/static/app-common.js"></script>
  <script>
    const token = getAccessToken();
    const errorNode = document.getElementById("error");

    function setError(message) {
      errorNode.textContent = message || "";
    }

    function asShortDate(value) {
      if (!value) {
        return "-";
      }
      const date = new Date(value);
      return Number.isNaN(date.valueOf()) ? value : date.toLocaleString();
    }

    async function restoreTicket(ticketId) {
      setError("");
      const response = await fetch(`/api/tickets/${ticketId}/restore`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Could not restore ticket");
        return;
      }

      loadTrash();
    }

    async function purgeTicket(ticketId) {
      if (!window.confirm("Permanently delete this ticket? This cannot be undone.")) {
        return;
      }

      setError("");
      const response = await fetch(`/api/tickets/${ticketId}/purge`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Could not permanently delete ticket");
        return;
      }

      loadTrash();
    }

    async function loadTrash() {
      setError("");
      const response = await fetch("/api/tickets/trash", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        setError("Could not load trash");
        return;
      }

      const tickets = await response.json();
      const body = document.getElementById("trash-body");
      const emptyNode = document.getElementById("empty-note");
      body.innerHTML = "";

      if (!tickets.length) {
        emptyNode.classList.remove("d-none");
        return;
      }

      emptyNode.classList.add("d-none");

      tickets.forEach((ticket) => {
        const tr = document.createElement("tr");

        const titleCell = document.createElement("td");
        titleCell.textContent = ticket.title || "(untitled)";

        const ownerCell = document.createElement("td");
        ownerCell.textContent = ticket.owner_username || ticket.owner_user_id || "-";

        const deletedCell = document.createElement("td");
        deletedCell.textContent = asShortDate(ticket.deleted_at);

        const actionCell = document.createElement("td");
        actionCell.className = "row-actions";

        const restoreBtn = document.createElement("button");
        restoreBtn.className = "btn btn-sm btn-outline-success";
        restoreBtn.type = "button";
        restoreBtn.textContent = "Restore";
        restoreBtn.addEventListener("click", () => restoreTicket(ticket.id));

        const purgeBtn = document.createElement("button");
        purgeBtn.className = "btn btn-sm btn-outline-danger";
        purgeBtn.type = "button";
        purgeBtn.textContent = "Delete forever";
        purgeBtn.addEventListener("click", () => purgeTicket(ticket.id));

        actionCell.appendChild(restoreBtn);
        actionCell.appendChild(purgeBtn);

        tr.appendChild(titleCell);
        tr.appendChild(ownerCell);
        tr.appendChild(deletedCell);
        tr.appendChild(actionCell);

        body.appendChild(tr);
      });
    }

    attachLogout("logout-btn");
    loadTrash();
  </script>
</body>
</html>
