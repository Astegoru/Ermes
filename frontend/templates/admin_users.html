<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
  <style>
    .users-shell {
      max-width: 980px;
    }

    .toolbar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.9rem;
    }

    .toolbar .search {
      min-width: 260px;
      flex: 1;
    }

    .role-pill {
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.16rem 0.52rem;
    }

    .role-moneda { background: #d4f0e3; color: #136b43; }
    .role-solver { background: #dde8ff; color: #2957c2; }
    .role-outsider { background: #f2ead8; color: #94631d; }
  </style>
</head>
<body>
  <main class="app-shell users-shell">
    <header class="topbar">
      <div>
        <h1 class="brand-title">User Role Assignment</h1>
        <p class="brand-note">Assign Moneda, Solver, or Outsider to authenticated users to remove ticket-list 403s.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/admin">Back to admin</a>
        <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <section class="surface-card">
      <div class="toolbar">
        <input class="form-control search" id="search" placeholder="Search by username or user ID">
        <button class="btn btn-outline-primary" id="refresh-users" type="button">Refresh</button>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle mb-0">
          <thead>
            <tr>
              <th>User</th>
              <th>User ID</th>
              <th>Role</th>
              <th>Last login</th>
              <th></th>
              <th></th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </section>

    <p class="inline-error" id="error"></p>
  </main>

  <script src="/static/app-common.js"></script>
  <script>
    const errorNode = document.getElementById("error");
    const bodyNode = document.getElementById("users-body");
    let users = [];

    function setError(message) {
      errorNode.textContent = message || "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function roleClass(role) {
      return `role-${role || "outsider"}`;
    }

    async function loadUsers() {
      const response = await fetch("/api/admin/users");
      if (response.status === 403) {
        setError("Sign in as admin first at /admin/login.");
        return;
      }

      if (!response.ok) {
        setError("Could not load users");
        return;
      }

      users = await response.json();
      renderUsers();
    }

    async function updateRole(userId, role) {
      const response = await fetch(`/api/admin/users/${userId}/profile`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role })
      });

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(payload.error || "Could not update role");
      }
    }

    async function makeSuperuser(userId) {
      const response = await fetch("/api/admin/superuser/assign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId })
      });

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(payload.error || "Could not assign superuser");
      }
    }

    function renderUsers() {
      const searchValue = document.getElementById("search").value.trim().toLowerCase();
      const filtered = users.filter((user) => {
        const username = (user.external_username || "").toLowerCase();
        const userId = (user.id || "").toLowerCase();
        return !searchValue || username.includes(searchValue) || userId.includes(searchValue);
      });

      bodyNode.innerHTML = "";
      if (!filtered.length) {
        bodyNode.innerHTML = '<tr><td colspan="6" class="text-muted">No matching users.</td></tr>';
        return;
      }

      filtered.forEach((user) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(user.external_username || "-")}</td>
          <td><code>${escapeHtml(user.id)}</code></td>
          <td>
            <div class="d-flex gap-2 align-items-center">
              <span class="role-pill ${roleClass(user.role)}">${escapeHtml(user.role || "outsider")}</span>
              <select class="form-select form-select-sm" data-role-user="${escapeHtml(user.id)}" style="max-width: 140px;">
                <option value="outsider" ${user.role === "outsider" ? "selected" : ""}>Outsider</option>
                <option value="solver" ${user.role === "solver" ? "selected" : ""}>Solver</option>
                <option value="moneda" ${user.role === "moneda" ? "selected" : ""}>Moneda</option>
              </select>
            </div>
          </td>
          <td>${escapeHtml(user.last_login_at || "-")}</td>
          <td><button class="btn btn-sm btn-outline-primary" type="button" data-save-user="${escapeHtml(user.id)}">Save role</button></td>
          <td><button class="btn btn-sm btn-outline-dark" type="button" data-super-user="${escapeHtml(user.id)}">Make superuser</button></td>
        `;
        bodyNode.appendChild(tr);
      });

      bodyNode.querySelectorAll("[data-save-user]").forEach((button) => {
        button.addEventListener("click", async () => {
          const userId = button.getAttribute("data-save-user");
          const select = bodyNode.querySelector(`[data-role-user="${userId}"]`);
          if (!select) {
            return;
          }

          try {
            setError("");
            await updateRole(userId, select.value);
            await loadUsers();
          } catch (error) {
            setError(error.message || "Could not update role");
          }
        });
      });

      bodyNode.querySelectorAll("[data-super-user]").forEach((button) => {
        button.addEventListener("click", async () => {
          try {
            setError("");
            await makeSuperuser(button.getAttribute("data-super-user"));
            setError("Superuser assigned.");
          } catch (error) {
            setError(error.message || "Could not assign superuser");
          }
        });
      });
    }

    document.getElementById("search").addEventListener("input", renderUsers);
    document.getElementById("refresh-users").addEventListener("click", () => {
      setError("");
      loadUsers();
    });

    attachLogout("logout-btn", "/admin/login");
    loadUsers();
  </script>
</body>
</html>
