<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
  <style>
    .form-shell {
      max-width: 860px;
      margin: 0 auto;
    }

    .urgency-value {
      font-weight: 800;
      color: var(--accent-strong);
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.45rem;
    }

    .category-add {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      padding: 0;
      font-size: 1.2rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    #category-toggle-list {
      max-height: 180px;
      overflow-y: auto;
      padding-right: 2px;
      /* fade hint at bottom when scrollable */
      mask-image: linear-gradient(to bottom, black calc(100% - 28px), transparent 100%);
    }

    .attach-trigger {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      cursor: pointer;
      font-weight: 700;
      color: var(--ink);
      font-size: 0.9rem;
    }

    .attach-trigger:hover {
      color: var(--accent);
    }

    .attach-icon {
      flex-shrink: 0;
    }

    .attachment-zone {
      border: 1px dashed var(--line);
      border-radius: 0.8rem;
      padding: 0.75rem 0.9rem;
      background: #fff;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .footer-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }

    .mobile-submit {
      position: fixed;
      left: 0.8rem;
      right: 0.8rem;
      bottom: 0.8rem;
      z-index: 25;
      display: none;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 0.9rem;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      box-shadow: 0 14px 24px rgba(199, 77, 24, 0.35);
    }

    .modal-backdrop-lite {
      position: fixed;
      inset: 0;
      background: rgba(18, 16, 12, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 110;
      padding: 1rem;
    }

    .modal-backdrop-lite.show {
      display: flex;
    }

    .modal-lite {
      width: min(540px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 1rem;
      box-shadow: 0 16px 28px rgba(24, 20, 14, 0.24);
      padding: 1rem;
    }

    .modal-lite-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.7rem;
    }

    .modal-lite-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      font-family: "Space Grotesk", sans-serif;
    }

    @media (max-width: 767.98px) {
      .footer-actions {
        display: none;
      }

      .mobile-submit {
        display: block;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell form-shell">
    <header class="topbar">
      <div>
        <h1 class="brand-title">Create a new ticket</h1>
        <p class="brand-note">Capture urgency first and route it to the correct category.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/">Back to list</a>
        <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <form id="ticket-form" class="surface-card row g-3">
      <div class="col-12">
        <label class="form-label" for="title">Title</label>
        <input class="form-control" id="title" placeholder="Short incident summary" required>
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label" for="urgency">Urgency (1-5) <span class="urgency-value" id="urgency-value">3</span></label>
        <input class="form-range" id="urgency" type="range" min="1" max="5" value="3" required>
      </div>

      <div class="col-12 col-md-6">
        <div class="category-header">
          <label class="form-label mb-0">Category</label>
          <button class="btn btn-outline-primary category-add" id="open-create-category" type="button" aria-label="Create category">+</button>
        </div>
        <div id="category-toggle-list" class="toggle-grid"></div>
      </div>

      <div class="col-12">
        <label class="form-label" for="error-link">Error reference link (optional)</label>
        <input class="form-control" id="error-link" type="url" placeholder="https://example.com/logs/trace-123">
      </div>

      <div class="col-12">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" rows="5" placeholder="Describe impact and context"></textarea>
      </div>

      <div class="col-12">
        <div class="attachment-zone" id="attachment-zone">
          <label class="attach-trigger" for="attachment">
            <svg class="attach-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21.44 11.05L12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.18a4 4 0 0 1 5.66 5.65L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
            Attach file
          </label>
          <input class="d-none" id="attachment" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,image/*,application/pdf">
          <p class="mb-0 mt-1 small">or paste a file with <kbd>Ctrl+V</kbd></p>
          <div class="mt-1 fw-600" id="attachment-name"></div>
        </div>
      </div>

      <div class="col-12 footer-actions">
        <button class="btn btn-primary" type="submit">Create Ticket</button>
        <a class="btn btn-link" href="/">Cancel</a>
      </div>
    </form>

    <p class="inline-error" id="error"></p>
  </main>

  <section class="modal-backdrop-lite" id="category-modal" role="dialog" aria-modal="true" aria-labelledby="category-modal-title">
    <div class="modal-lite">
      <div class="modal-lite-header">
        <h2 class="modal-lite-title" id="category-modal-title">Create category</h2>
        <button class="btn btn-sm btn-outline-secondary" type="button" id="close-category-modal">Close</button>
      </div>
      <form id="create-category-form" class="row g-2">
        <div class="col-12 col-md-5">
          <label class="form-label" for="new-category-name">Title</label>
          <input class="form-control" id="new-category-name" required>
        </div>
        <div class="col-12 col-md-7">
          <label class="form-label" for="new-category-description">Description</label>
          <input class="form-control" id="new-category-description">
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end mt-3">
          <button class="btn btn-outline-secondary" type="button" id="cancel-category-modal">Cancel</button>
          <button class="btn btn-primary" type="submit">Create category</button>
        </div>
      </form>
    </div>
  </section>

  <button class="mobile-submit" type="submit" form="ticket-form">Create Ticket</button>

  <script src="/static/app-common.js"></script>
  <script>
    const token = getAccessToken();
    const formNode = document.getElementById("ticket-form");
    const urgencyNode = document.getElementById("urgency");
    const urgencyValueNode = document.getElementById("urgency-value");
    const errorNode = document.getElementById("error");
    const attachmentInputNode = document.getElementById("attachment");
    const attachmentNameNode = document.getElementById("attachment-name");
    const categoryModalNode = document.getElementById("category-modal");

    let categories = [];
    let selectedAttachment = null;

    function setError(message) {
      errorNode.textContent = message || "";
    }

    function getErrorMessage(payload, fallback) {
      return payload && payload.error ? payload.error : fallback;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openCategoryModal() {
      categoryModalNode.classList.add("show");
      document.getElementById("new-category-name").focus();
    }

    function closeCategoryModal() {
      categoryModalNode.classList.remove("show");
    }

    function renderCategoryChoices(selectedId) {
      const target = document.getElementById("category-toggle-list");
      target.innerHTML = "";

      if (!categories.length) {
        target.innerHTML = '<p class="mb-0 small text-muted">No categories yet. Use + to create one.</p>';
        return;
      }

      categories.forEach((item, index) => {
        const safeName = escapeHtml(item.name || "Unnamed");
        const safeId = escapeHtml(item.id);
        const id = `cat-${index}`;
        const shouldSelect = selectedId ? selectedId === item.id : false;

        target.insertAdjacentHTML(
          "beforeend",
          `
            <div>
              <input class="toggle-input" type="radio" name="category-choice" id="${id}" value="${safeId}" ${shouldSelect ? "checked" : ""}>
              <label class="toggle-label" for="${id}" title="${safeId}">${safeName}</label>
            </div>
          `
        );
      });
    }

    async function loadCategories(selectedId) {
      const response = await fetch("/api/categories", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(getErrorMessage(payload, "Could not load categories"));
      }

      categories = await response.json();
      renderCategoryChoices(selectedId);
    }

    function getSelectedCategoryId() {
      const selected = document.querySelector("input[name='category-choice']:checked");
      return selected ? selected.value : "";
    }

    function setAttachment(file) {
      selectedAttachment = file;
      if (!file) {
        attachmentNameNode.textContent = "No file attached.";
        return;
      }
      attachmentNameNode.textContent = `Attached: ${file.name} (${Math.ceil(file.size / 1024)} KB)`;
    }

    async function createCategory(name, description) {
      const response = await fetch("/api/categories", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ name, description })
      });

      if (redirectIfUnauthorized(response)) {
        throw new Error("Unauthorized");
      }

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(getErrorMessage(payload, "Could not create category"));
      }

      return response.json();
    }

    async function uploadAttachmentIfNeeded() {
      if (!selectedAttachment) {
        return { file_url: null, file_type: null };
      }

      const formData = new FormData();
      formData.append("file", selectedAttachment);

      const response = await fetch("/api/files/upload", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`
        },
        body: formData
      });

      if (redirectIfUnauthorized(response)) {
        throw new Error("Unauthorized");
      }

      if (!response.ok) {
        const payload = await response.json();
        throw new Error(getErrorMessage(payload, "Attachment upload failed"));
      }

      const uploadPayload = await response.json();
      return {
        file_url: uploadPayload.file_url,
        file_type: uploadPayload.file_type
      };
    }

    urgencyNode.addEventListener("input", () => {
      urgencyValueNode.textContent = urgencyNode.value;
    });

    attachmentInputNode.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0] ? event.target.files[0] : null;
      setAttachment(file);
    });

    window.addEventListener("paste", (event) => {
      const clipboardItems = event.clipboardData && event.clipboardData.items ? event.clipboardData.items : [];
      for (const item of clipboardItems) {
        if (item.kind !== "file") {
          continue;
        }

        const file = item.getAsFile();
        if (!file) {
          continue;
        }

        setAttachment(file);
        event.preventDefault();
        break;
      }
    });

    document.getElementById("open-create-category").addEventListener("click", () => {
      setError("");
      openCategoryModal();
    });

    document.getElementById("close-category-modal").addEventListener("click", closeCategoryModal);
    document.getElementById("cancel-category-modal").addEventListener("click", closeCategoryModal);

    categoryModalNode.addEventListener("click", (event) => {
      if (event.target === categoryModalNode) {
        closeCategoryModal();
      }
    });

    document.getElementById("create-category-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const name = document.getElementById("new-category-name").value.trim();
      const description = document.getElementById("new-category-description").value.trim();

      if (!name) {
        setError("Category title is required");
        return;
      }

      try {
        const created = await createCategory(name, description);
        await loadCategories(created.id);
        closeCategoryModal();
        document.getElementById("new-category-name").value = "";
        document.getElementById("new-category-description").value = "";
      } catch (error) {
        setError(error.message || "Could not create category");
      }
    });

    formNode.addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      try {
        const categoryId = getSelectedCategoryId();
        if (!categoryId) {
          setError("Select a category or create one with +");
          return;
        }

        const uploadFields = await uploadAttachmentIfNeeded();
        const errorLink = document.getElementById("error-link").value.trim();

        const response = await fetch("/api/tickets", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({
            title: document.getElementById("title").value.trim(),
            urgency: Number(urgencyNode.value),
            category_id: categoryId,
            description: document.getElementById("description").value,
            link: errorLink || null,
            file_url: uploadFields.file_url,
            file_type: uploadFields.file_type
          })
        });

        if (redirectIfUnauthorized(response)) {
          return;
        }

        if (!response.ok) {
          const payload = await response.json();
          setError(getErrorMessage(payload, "Failed to create ticket"));
          return;
        }

        window.location.href = "/";
      } catch (error) {
        setError(error.message || "Failed to create ticket");
      }
    });

    attachLogout("logout-btn");

    (async () => {
      try {
        await loadCategories();
      } catch (error) {
        setError(error.message);
      }
    })();
  </script>
</body>
</html>
