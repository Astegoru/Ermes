<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
</head>
<body>
  <main class="app-shell" style="max-width: 760px;">
    <header class="topbar">
      <div>
        <h1 class="brand-title">Superuser Assignment</h1>
        <p class="brand-note">Set or rotate the application superuser.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/">Back</a>
        <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <form id="assign-form" class="surface-card row g-2 mb-3">
      <div class="col-md-8">
        <label class="form-label" for="user-id">App User ID</label>
        <input class="form-control" id="user-id" placeholder="App User ID" required>
      </div>
      <div class="col-md-4 d-grid align-self-end">
        <button class="btn btn-primary" type="submit">Assign</button>
      </div>
    </form>

    <div class="surface-card" id="current">Current superuser: loading...</div>
    <p class="inline-error" id="error"></p>
  </main>

  <script src="/static/app-common.js"></script>
  <script>
    const currentNode = document.getElementById("current");
    const errorNode = document.getElementById("error");

    function setError(message) {
      errorNode.textContent = message || "";
    }

    async function loadCurrent() {
      const response = await fetch("/api/admin/superuser");

      if (response.status === 403) {
        setError("Sign in as admin first.");
        currentNode.textContent = "Current superuser: unavailable";
        return;
      }

      const payload = await response.json();
      currentNode.textContent = `Current superuser: ${payload.value || "not assigned"}`;
    }

    document.getElementById("assign-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const response = await fetch("/api/admin/superuser/assign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: document.getElementById("user-id").value })
      });

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Assignment failed");
        return;
      }

      loadCurrent();
    });

    attachLogout("logout-btn", "/admin/login");
    loadCurrent();
  </script>
</body>
</html>
