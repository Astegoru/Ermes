<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
  <style>
    .detail-shell {
      max-width: 780px;
      margin: 0 auto;
    }

    .ticket-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .ticket-title {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      margin: 0;
      line-height: 1.25;
    }

    .ticket-title-edit {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .priority-badge {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 999px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      color: #fff;
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
    }

    .meta-line {
      margin-top: 0.55rem;
      font-size: 0.88rem;
      color: var(--muted);
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .status-badge {
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .status-open { background: #d4f0e3; color: var(--ok); }
    .status-in_progress { background: #dde8ff; color: #2957c2; }
    .status-solved { background: #d4f0e3; color: var(--ok); }
    .status-archived,
    .status-deleted_soft { background: #f5e9cc; color: var(--warn); }

    .section-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .actions {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      padding-top: 0.25rem;
    }

    /* Solve confirmation modal */
    .modal-backdrop-lite {
      position: fixed;
      inset: 0;
      background: rgba(18, 16, 12, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 110;
      padding: 1rem;
    }

    .modal-backdrop-lite.show {
      display: flex;
    }

    .modal-lite {
      width: min(480px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 1rem;
      box-shadow: 0 16px 28px rgba(24, 20, 14, 0.24);
      padding: 1.25rem;
    }

    .modal-lite-title {
      margin: 0 0 0.45rem;
      font-size: 1rem;
      font-weight: 800;
      font-family: "Space Grotesk", sans-serif;
    }

    @media (max-width: 767.98px) {
      .ticket-title { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <main class="app-shell detail-shell">
    <header class="topbar">
      <div></div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/">Back</a>
        <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <!-- View mode -->
    <section class="surface-card" id="view-mode">
      <div class="ticket-header">
        <h1 class="ticket-title" id="view-title"></h1>
        <span class="priority-badge" id="view-priority"></span>
      </div>

      <div class="meta-line">
        <span id="view-status-badge"></span>
        <span id="view-category"></span>
        <span id="view-owner"></span>
      </div>

      <div class="mt-3" id="view-description-block">
        <p class="section-label">Description</p>
        <p class="mb-0" id="view-description" style="white-space: pre-wrap;"></p>
      </div>

      <div class="mt-3" id="view-link-block">
        <p class="section-label">Error reference</p>
        <a id="view-link" href="#" target="_blank" rel="noreferrer"></a>
      </div>

      <div class="mt-3" id="view-file-block">
        <p class="section-label">Attachment</p>
        <a id="view-file" href="#" target="_blank" rel="noreferrer">Open attachment</a>
      </div>

      <div class="mt-3" id="view-solved-by-block">
        <p class="section-label">Solved by</p>
        <span id="view-solved-by"></span>
      </div>

      <hr class="my-3">
      <div class="actions" id="action-row"></div>
    </section>

    <!-- Edit mode (owner only) -->
    <section class="surface-card d-none" id="edit-mode">
      <form id="edit-form" class="row g-3">
        <div class="col-12">
          <label class="form-label" for="edit-title">Title</label>
          <input class="form-control ticket-title-edit" id="edit-title" required>
        </div>
        <div class="col-6">
          <label class="form-label" for="edit-urgency">Urgency <span class="urgency-value" id="edit-urgency-value" style="color: var(--accent-strong); font-weight: 800;"></span></label>
          <input class="form-range" id="edit-urgency" type="range" min="1" max="5">
        </div>
        <div class="col-12">
          <label class="form-label" for="edit-description">Description</label>
          <textarea class="form-control" id="edit-description" rows="5"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label" for="edit-link">Error reference link (optional)</label>
          <input class="form-control" id="edit-link" type="url">
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end">
          <button class="btn btn-outline-secondary" id="cancel-edit" type="button">Cancel</button>
          <button class="btn btn-primary" type="submit">Save changes</button>
        </div>
      </form>
    </section>

    <p class="inline-error" id="error"></p>
  </main>

  <!-- Solve confirmation modal -->
  <section class="modal-backdrop-lite" id="solve-modal" role="dialog" aria-modal="true">
    <div class="modal-lite">
      <h2 class="modal-lite-title">Mark as solved?</h2>
      <p class="text-muted mb-3" style="font-size: 0.92rem;">This will close the ticket and record you as the resolver.</p>
      <div class="d-flex gap-2 justify-content-end">
        <button class="btn btn-outline-secondary" id="cancel-solve">Cancel</button>
        <button class="btn btn-success" id="confirm-solve">Mark as solved</button>
      </div>
    </div>
  </section>

  <script src="/static/app-common.js"></script>
  <script>
    const ticketId = window.location.pathname.split("/").pop();
    const token = getAccessToken();
    const errorNode = document.getElementById("error");

    let currentTicket = null;
    let currentUser = null;

    function setError(message) {
      errorNode.textContent = message || "";
    }

    function showBlock(id, show) {
      document.getElementById(id).classList.toggle("d-none", !show);
    }

    function openSolveModal() {
      document.getElementById("solve-modal").classList.add("show");
    }

    function closeSolveModal() {
      document.getElementById("solve-modal").classList.remove("show");
    }

    function statusBadgeHtml(status) {
      return `<span class="status-badge status-${status}">${status.replace("_", " ")}</span>`;
    }

    function renderView(ticket) {
      currentTicket = ticket;

      document.title = ticket.title || "Ticket";
      document.getElementById("view-title").textContent = ticket.title || "";
      document.getElementById("view-priority").textContent = `P${ticket.urgency}`;

      const statusBadgeNode = document.getElementById("view-status-badge");
      statusBadgeNode.innerHTML = statusBadgeHtml(ticket.status);

      const categoryNode = document.getElementById("view-category");
      if (ticket.category_name) {
        categoryNode.textContent = ticket.category_name;
        showBlock("view-category", true);
      } else {
        showBlock("view-category", false);
      }

      const ownerNode = document.getElementById("view-owner");
      if (ticket.owner_username) {
        ownerNode.textContent = `Owner: ${ticket.owner_username}`;
      } else {
        ownerNode.textContent = "";
      }

      const descBlock = document.getElementById("view-description-block");
      const descNode = document.getElementById("view-description");
      if (ticket.description) {
        descNode.textContent = ticket.description;
        descBlock.classList.remove("d-none");
      } else {
        descBlock.classList.add("d-none");
      }

      const linkBlock = document.getElementById("view-link-block");
      const linkNode = document.getElementById("view-link");
      if (ticket.link) {
        linkNode.href = ticket.link;
        linkNode.textContent = ticket.link;
        linkBlock.classList.remove("d-none");
      } else {
        linkBlock.classList.add("d-none");
      }

      const fileBlock = document.getElementById("view-file-block");
      const fileNode = document.getElementById("view-file");
      if (ticket.file_url) {
        fileNode.href = ticket.file_url;
        fileBlock.classList.remove("d-none");
      } else {
        fileBlock.classList.add("d-none");
      }

      const solvedByBlock = document.getElementById("view-solved-by-block");
      const solvedByNode = document.getElementById("view-solved-by");
      if (ticket.solved_by_username || ticket.solved_by_user_id) {
        solvedByNode.textContent = ticket.solved_by_username || ticket.solved_by_user_id;
        solvedByBlock.classList.remove("d-none");
      } else {
        solvedByBlock.classList.add("d-none");
      }

      buildActions(ticket);
    }

    function buildActions(ticket) {
      const row = document.getElementById("action-row");
      row.innerHTML = "";

      const isOwner = currentUser && ticket.owner_user_id === currentUser.id;
      const isActive = ticket.status === "open" || ticket.status === "in_progress";

      if (isOwner && isActive) {
        const editBtn = document.createElement("button");
        editBtn.className = "btn btn-outline-primary";
        editBtn.textContent = "Edit";
        editBtn.addEventListener("click", enterEditMode);
        row.appendChild(editBtn);
      }

      if (isOwner && ticket.status === "open") {
        const progressBtn = document.createElement("button");
        progressBtn.className = "btn btn-outline-secondary";
        progressBtn.textContent = "Mark In Progress";
        progressBtn.addEventListener("click", markInProgress);
        row.appendChild(progressBtn);
      }

      if (isActive) {
        const solveBtn = document.createElement("button");
        solveBtn.className = "btn btn-success";
        solveBtn.textContent = "Solve";
        solveBtn.addEventListener("click", openSolveModal);
        row.appendChild(solveBtn);
      }

      if (isOwner && isActive) {
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn btn-outline-danger";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", deleteSoft);
        row.appendChild(deleteBtn);
      }
    }

    function enterEditMode() {
      const ticket = currentTicket;
      document.getElementById("edit-title").value = ticket.title || "";
      document.getElementById("edit-urgency").value = ticket.urgency || 3;
      document.getElementById("edit-urgency-value").textContent = ticket.urgency || 3;
      document.getElementById("edit-description").value = ticket.description || "";
      document.getElementById("edit-link").value = ticket.link || "";

      showBlock("view-mode", false);
      showBlock("edit-mode", true);
    }

    function exitEditMode() {
      showBlock("edit-mode", false);
      showBlock("view-mode", true);
    }

    async function loadDetail() {
      const response = await fetch(`/api/tickets/${ticketId}`, {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        setError("Could not load ticket");
        return;
      }

      const ticket = await response.json();
      renderView(ticket);
    }

    async function loadCurrentUser() {
      const response = await fetch("/api/auth/me", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (!response.ok) {
        return;
      }

      currentUser = await response.json();
    }

    async function markInProgress() {
      setError("");
      const response = await fetch(`/api/tickets/${ticketId}/progress`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Could not mark as in progress");
        return;
      }

      loadDetail();
    }

    async function confirmSolve() {
      closeSolveModal();
      setError("");

      const response = await fetch(`/api/tickets/${ticketId}/solve`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Solve failed");
        return;
      }

      loadDetail();
    }

    async function deleteSoft() {
      setError("");

      const response = await fetch(`/api/tickets/${ticketId}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Delete failed");
        return;
      }

      window.location.href = "/";
    }

    document.getElementById("edit-urgency").addEventListener("input", (event) => {
      document.getElementById("edit-urgency-value").textContent = event.target.value;
    });

    document.getElementById("cancel-edit").addEventListener("click", exitEditMode);

    document.getElementById("edit-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const updates = {
        title: document.getElementById("edit-title").value.trim(),
        urgency: Number(document.getElementById("edit-urgency").value),
        description: document.getElementById("edit-description").value,
        link: document.getElementById("edit-link").value.trim() || null
      };

      const response = await fetch(`/api/tickets/${ticketId}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(updates)
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Save failed");
        return;
      }

      showBlock("edit-mode", false);
      showBlock("view-mode", true);
      loadDetail();
    });

    document.getElementById("cancel-solve").addEventListener("click", closeSolveModal);
    document.getElementById("confirm-solve").addEventListener("click", confirmSolve);

    document.getElementById("solve-modal").addEventListener("click", (event) => {
      if (event.target === document.getElementById("solve-modal")) {
        closeSolveModal();
      }
    });

    attachLogout("logout-btn");

    (async () => {
      await loadCurrentUser();
      await loadDetail();
    })();
  </script>
</body>
</html>
