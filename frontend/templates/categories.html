<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categories</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="/static/app-theme.css" rel="stylesheet">
  <style>
    .stack {
      display: grid;
      gap: 1rem;
    }

    .category-list {
      display: grid;
      gap: 0.45rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .category-item {
      border: 1px solid var(--line);
      border-radius: 0.8rem;
      padding: 0.7rem 0.85rem;
      background: #fff;
      font-size: 0.92rem;
      display: flex;
      justify-content: space-between;
      gap: 0.55rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .category-id-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .category-id {
      color: var(--muted);
      font-size: 0.78rem;
      font-family: monospace;
    }

    .copy-btn {
      background: none;
      border: none;
      padding: 0.15rem 0.3rem;
      border-radius: 0.4rem;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .copy-btn:hover {
      color: var(--accent);
      background: var(--chip);
    }

    .copy-btn.copied {
      color: var(--ok);
    }

    .merge-select {
      height: auto;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1 class="brand-title">Categories</h1>
        <p class="brand-note">Maintain active categories and merge duplicates safely.</p>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="/">Back</a>
        <button class="btn btn-outline-dark btn-logout" id="logout-btn" type="button">Logout</button>
      </div>
    </header>

    <section class="stack">
      <form id="create-category" class="surface-card row g-2">
        <div class="col-12 col-md-4">
          <label class="form-label" for="name">Name</label>
          <input class="form-control" id="name" placeholder="Name" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label" for="description">Description</label>
          <input class="form-control" id="description" placeholder="Description">
        </div>
        <div class="col-12 col-md-2 d-grid align-self-end">
          <button class="btn btn-primary" type="submit">Create</button>
        </div>
      </form>

      <section class="surface-card">
        <h2 class="h6 mb-3">Active Categories</h2>
        <ul class="category-list" id="categories-list"></ul>
      </section>

      <form id="merge-form" class="surface-card row g-2">
        <h2 class="h6 mb-2">Merge Categories</h2>
        <p class="text-muted" style="font-size: 0.88rem; margin-bottom: 0.5rem;">
          Select one or more source categories to merge into a target. Sources will be deactivated and their tickets reassigned.
        </p>
        <div class="col-12 col-md-5">
          <label class="form-label" for="source-select">Sources <span class="text-muted fw-normal">(hold Ctrl / Cmd to pick multiple)</span></label>
          <select class="form-select merge-select" id="source-select" multiple size="4" required></select>
        </div>
        <div class="col-12 col-md-5">
          <label class="form-label" for="target-select">Merge into</label>
          <select class="form-select" id="target-select" required>
            <option value="">Select target category</option>
          </select>
        </div>
        <div class="col-12 col-md-2 d-grid align-self-end">
          <button class="btn btn-outline-dark" type="submit">Merge</button>
        </div>
      </form>
    </section>

    <p class="inline-error" id="error"></p>
  </main>

  <script src="/static/app-common.js"></script>
  <script>
    const token = getAccessToken();
    const errorNode = document.getElementById("error");

    function setError(message) {
      errorNode.textContent = message || "";
    }

    function populateMergeSelects(list) {
      const sourceSelect = document.getElementById("source-select");
      const targetSelect = document.getElementById("target-select");

      sourceSelect.innerHTML = "";
      targetSelect.innerHTML = '<option value="">Select target category</option>';

      list.forEach((item) => {
        const srcOpt = document.createElement("option");
        srcOpt.value = item.id;
        srcOpt.textContent = item.name;
        sourceSelect.appendChild(srcOpt);

        const tgtOpt = document.createElement("option");
        tgtOpt.value = item.id;
        tgtOpt.textContent = item.name;
        targetSelect.appendChild(tgtOpt);
      });
    }

    async function loadCategories() {
      const response = await fetch("/api/categories", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        setError("Could not load categories");
        return;
      }

      const list = await response.json();
      const node = document.getElementById("categories-list");
      node.innerHTML = "";

      list.forEach((item) => {
        const li = document.createElement("li");
        li.className = "category-item";

        const nameSpan = document.createElement("span");
        nameSpan.textContent = item.name;

        const idWrap = document.createElement("span");
        idWrap.className = "category-id-wrap";

        const idSpan = document.createElement("span");
        idSpan.className = "category-id";
        idSpan.textContent = item.id;

        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "copy-btn";
        copyBtn.title = "Copy ID";
        copyBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(item.id).then(() => {
            copyBtn.classList.add("copied");
            copyBtn.title = "Copied!";
            setTimeout(() => {
              copyBtn.classList.remove("copied");
              copyBtn.title = "Copy ID";
            }, 1800);
          });
        });

        idWrap.appendChild(idSpan);
        idWrap.appendChild(copyBtn);
        li.appendChild(nameSpan);
        li.appendChild(idWrap);
        node.appendChild(li);
      });

      populateMergeSelects(list);
    }

    document.getElementById("create-category").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const response = await fetch("/api/categories", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          description: document.getElementById("description").value
        })
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Could not create category");
        return;
      }

      document.getElementById("name").value = "";
      document.getElementById("description").value = "";
      loadCategories();
    });

    document.getElementById("merge-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      setError("");

      const sourceSelect = document.getElementById("source-select");
      const sourceIds = Array.from(sourceSelect.selectedOptions).map((opt) => opt.value);
      const targetId = document.getElementById("target-select").value;

      if (!sourceIds.length) {
        setError("Select at least one source category");
        return;
      }

      if (!targetId) {
        setError("Select a target category");
        return;
      }

      if (sourceIds.includes(targetId)) {
        setError("Target cannot be one of the source categories");
        return;
      }

      const response = await fetch("/api/categories/merge", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ source_ids: sourceIds, target_id: targetId })
      });

      if (redirectIfUnauthorized(response)) {
        return;
      }

      if (!response.ok) {
        const payload = await response.json();
        setError(payload.error || "Merge failed");
        return;
      }

      loadCategories();
    });

    attachLogout("logout-btn");
    loadCategories();
  </script>
</body>
</html>
